#############################################
# Set up configration
#############################################
[metadata]
name = featurematch

classifiers =
    Lisence :: OSI Approved :: MIT License
    Programming Language :: Python
    Programming Language :: Python :: 3.7

[options]

# where is my code
packages = find:
package_dir =
    = src
zip_safe = false
python_requires  >=3.7

install_requires =
    click
    obonet

[options.packages.find]
where = src

[options.entry_points]
console_scripts =
    pcy = pcy.cli:main
